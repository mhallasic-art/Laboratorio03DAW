<!DOCTYPE html>
<html>
<body>
<h1>The Navigator Object</h1>
<h2>The userAgent Property</h2>

<p>The userAgent property returns the user-agent header sent by the browser to the server:</p>

<p id="demo"></p>

<script>
document.getElementById("demo").innerHTML =
navigator.userAgent;
</script>

</body>
</html>
