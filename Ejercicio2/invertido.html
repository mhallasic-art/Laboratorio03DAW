<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Invertir texto</title>
</head>
<body>

  <h2>Invertir texto</h2>

  <input type="text" id="texto" placeholder="Escribe un texto">
  <button id="btnInvertir">Invertir</button>

  <div id="resultado"></div>

  <script>
    // Obtener elementos
    const input = document.getElementById("texto");
    const boton = document.getElementById("btnInvertir");
    const resultado = document.getElementById("resultado");

    // Evento del botón
    boton.addEventListener("click", function() {
      const texto = input.value;
      const invertido = texto.split("").reverse().join("");
      resultado.textContent = invertido;
    });
  </script>

</body>
</html>
